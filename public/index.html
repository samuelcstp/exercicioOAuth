<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IFC Mural de Avisos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ede8;
      --surface: #faf9f7;
      --ink: #1a1714;
      --sub: #7a746e;
      --border: #e2ddd7;
      --accent: #c8522a;
      --accent-light: #fdf0eb;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--ink);
      height: 58px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .brand-badge {
      background: var(--accent);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.6rem;
      border-radius: 5px;
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0;
    }

    #headerName {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
    }

    .btn-sair {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sair:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }

    /* LAYOUT */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page-title {
      margin-bottom: 2rem;
    }

    .page-title h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.25rem;
      color: var(--ink);
      line-height: 1.15;
      font-weight: 400;
    }

    .page-title h1 i {
      font-style: italic;
      color: var(--accent);
    }

    .page-title p {
      font-size: 0.85rem;
      color: var(--sub);
      margin-top: 0.35rem;
    }

    /* FORM */
    .compose {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .compose-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 1rem;
      display: block;
    }

    .compose input,
    .compose textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      display: block;
      margin-bottom: 0.6rem;
    }

    .compose input:focus,
    .compose textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .compose textarea { min-height: 80px; }

    .compose-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.25rem;
    }

    .btn-publicar {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-publicar:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-publicar:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LISTA */
    .list-header {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 0.875rem;
    }

    #lista-avisos { display: flex; flex-direction: column; gap: 0.75rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.4rem;
      animation: up 0.25s ease both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .mini-av {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--ink);
      color: rgba(255,255,255,0.8);
      font-size: 0.65rem;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .meta-name {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--ink);
    }

    .meta-date {
      font-size: 0.75rem;
      color: var(--sub);
    }

    .tag-eu {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    .btn-del {
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      color: #ccc;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
      transition: all 0.15s;
    }
    .btn-del:hover { background: #fef2f2; color: #b91c1c; }

    .card-titulo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .card-texto {
      font-size: 0.875rem;
      color: #5c5650;
      line-height: 1.7;
    }

    .estado {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--sub);
      font-size: 0.875rem;
    }

    @media (max-width: 560px) {
      #headerName { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-badge">IFC</span>
    <span class="brand-name">Mural de Avisos</span>
  </div>
  <div class="header-right">
    <div class="avatar" id="headerAvatar">?</div>
    <span id="headerName"></span>
    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>
</header>

<main>
  <div class="page-title">
    <h1>Avisos do Campus</h1>
    <p>Publicações abertas para toda a comunidade</p>
  </div>

  <div class="compose">
    <span class="compose-label">Novo aviso</span>
    <input type="text" id="inputTitulo" placeholder="Título..." maxlength="100" />
    <textarea id="inputTexto" placeholder="Escreva o aviso..."></textarea>
    <div class="compose-footer">
      <button class="btn-publicar" id="btnPostar" onclick="postarAviso()">Publicar</button>
    </div>
  </div>

  <p class="list-header">Recentes</p>
  <div id="lista-avisos"><div class="estado">Carregando...</div></div>
</main>

<script>
  let me = null;
  const token = () => localStorage.getItem('token');
  const hdrs  = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` });

  function logout() { localStorage.removeItem('token'); location.href = '/login'; }

  function ini(n = '') {
    return n.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase() || '?';
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString('pt-BR', {
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  async function init() {
    if (!token()) return location.href = '/login';
    try {
      const r = await fetch('/api/me', { headers: hdrs() });
      if (!r.ok) throw 0;
      me = await r.json();
      document.getElementById('headerAvatar').textContent = ini(me.name);
      document.getElementById('headerName').textContent   = me.name.split(' ')[0];
      await load();
    } catch { logout(); }
  }

  async function load() {
    const el = document.getElementById('lista-avisos');
    try {
      const r = await fetch('/api/avisos', { headers: hdrs() });
      const data = await r.json();
      if (!data.length) {
        el.innerHTML = '<div class="estado">Nenhum aviso ainda. Seja o primeiro!</div>';
        return;
      }
      el.innerHTML = data.map((a, i) => `
        <div class="card" style="animation-delay:${i*0.035}s">
          <div class="card-top">
            <div class="card-meta">
              <div class="mini-av">${ini(a.autor)}</div>
              <span class="meta-name">${esc(a.autor)}</span>
              <span class="meta-date">${fmtDate(a.criadoEm)}</span>
              ${a.email === me?.email ? '<span class="tag-eu">meu</span>' : ''}
            </div>
            ${a.email === me?.email
              ? `<button class="btn-del" onclick="del('${a.id}')">excluir</button>`
              : ''}
          </div>
          <div class="card-titulo">${esc(a.titulo)}</div>
          <div class="card-texto">${esc(a.texto)}</div>
        </div>`).join('');
    } catch {
      el.innerHTML = '<div class="estado">Erro ao carregar.</div>';
    }
  }

  async function postarAviso() {
    const titulo = document.getElementById('inputTitulo').value.trim();
    const texto  = document.getElementById('inputTexto').value.trim();
    const btn    = document.getElementById('btnPostar');
    if (!titulo || !texto) { alert('Preencha título e texto.'); return; }
    btn.disabled = true; btn.textContent = 'Publicando...';
    try {
      const r = await fetch('/api/avisos', {
        method:'POST', headers: hdrs(), body: JSON.stringify({ titulo, texto })
      });
      if (!r.ok) throw 0;
      document.getElementById('inputTitulo').value = '';
      document.getElementById('inputTexto').value  = '';
      await load();
    } catch { alert('Erro ao publicar.'); }
    finally { btn.disabled = false; btn.textContent = 'Publicar'; }
  }

  async function del(id) {
    if (!confirm('Excluir este aviso?')) return;
    await fetch(`/api/avisos/${id}`, { method:'DELETE', headers: hdrs() });
    await load();
  }

  init();
</script>
</body>
</html>
