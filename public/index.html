<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IFC Mural de Avisos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand">
    <span class="brand-badge">IFC</span>
    <span class="brand-name">Mural de Avisos</span>
  </div>
  <div class="header-right">
    <div class="avatar" id="headerAvatar">?</div>
    <span id="headerName"></span>
    <button class="btn-sair" onclick="logout()">Sair</button>
  </div>
</header>

<main>
  <div class="page-title">
    <h1>Avisos do Campus</h1>
    <p>Publicações abertas para toda a comunidade</p>
  </div>

  <div class="compose">
    <span class="compose-label">Novo aviso</span>
    <input type="text" id="inputTitulo" placeholder="Título..." maxlength="100" />
    <textarea id="inputTexto" placeholder="Escreva o aviso..."></textarea>
    <div class="compose-footer">
      <button class="btn-publicar" id="btnPostar" onclick="postarAviso()">Publicar</button>
    </div>
  </div>

  <p class="list-header">Recentes</p>
  <div id="lista-avisos"><div class="estado">Carregando...</div></div>
</main>

<script>
  let me = null;
  const token = () => localStorage.getItem('token');
  const hdrs  = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` });

  function logout() { localStorage.removeItem('token'); location.href = '/login'; }

  function ini(n = '') {
    return n.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase() || '?';
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString('pt-BR', {
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  async function init() {
    if (!token()) return location.href = '/login';
    try {
      const r = await fetch('/api/me', { headers: hdrs() });
      if (!r.ok) throw 0;
      me = await r.json();
      document.getElementById('headerAvatar').textContent = ini(me.name);
      document.getElementById('headerName').textContent   = me.name.split(' ')[0];
      await load();
    } catch { logout(); }
  }

  async function load() {
    const el = document.getElementById('lista-avisos');
    try {
      const r = await fetch('/api/avisos', { headers: hdrs() });
      const data = await r.json();
      if (!data.length) {
        el.innerHTML = '<div class="estado">Nenhum aviso ainda. Seja o primeiro!</div>';
        return;
      }
      el.innerHTML = data.map((a, i) => `
        <div class="card" style="animation-delay:${i*0.035}s">
          <div class="card-top">
            <div class="card-meta">
              <div class="mini-av">${ini(a.autor)}</div>
              <span class="meta-name">${esc(a.autor)}</span>
              <span class="meta-date">${fmtDate(a.criadoEm)}</span>
              ${a.email === me?.email ? '<span class="tag-eu">meu</span>' : ''}
            </div>
            ${a.email === me?.email
              ? `<button class="btn-del" onclick="del('${a.id}')">excluir</button>`
              : ''}
          </div>
          <div class="card-titulo">${esc(a.titulo)}</div>
          <div class="card-texto">${esc(a.texto)}</div>
        </div>`).join('');
    } catch {
      el.innerHTML = '<div class="estado">Erro ao carregar.</div>';
    }
  }

  async function postarAviso() {
    const titulo = document.getElementById('inputTitulo').value.trim();
    const texto  = document.getElementById('inputTexto').value.trim();
    const btn    = document.getElementById('btnPostar');
    if (!titulo || !texto) { alert('Preencha título e texto.'); return; }
    btn.disabled = true; btn.textContent = 'Publicando...';
    try {
      const r = await fetch('/api/avisos', {
        method:'POST', headers: hdrs(), body: JSON.stringify({ titulo, texto })
      });
      if (!r.ok) throw 0;
      document.getElementById('inputTitulo').value = '';
      document.getElementById('inputTexto').value  = '';
      await load();
    } catch { alert('Erro ao publicar.'); }
    finally { btn.disabled = false; btn.textContent = 'Publicar'; }
  }

  async function del(id) {
    if (!confirm('Excluir este aviso?')) return;
    await fetch(`/api/avisos/${id}`, { method:'DELETE', headers: hdrs() });
    await load();
  }

  init();
</script>
</body>
</html>
